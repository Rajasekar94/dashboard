<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">

<style>

/* ===== GLOBAL ===== */
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color:#333;
}

/* ===== HEADER ===== */
.header-outer {
  position: relative;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 15px;
}

/* center title */
.commpanytitle {
  text-align: center;
}

.commpanytitle h1 {
  margin:0;
  font-size: 28px;
  letter-spacing: 1px;
}

.commpanytitle h4 {
  margin:0;
  font-size: 16px;
  opacity: 0.8;
}

/* logo left */
.logimg {
  position: absolute;
  left: 150px;
  top: 70px;
}

/* ===== NAV (LEFT ALIGN FIX) ===== */
#nav {
  background: #0d6efd;
  padding: 8px 10px;
}

#nav ul {
  list-style: none;
  margin: 0;
  padding: 0;
}

#nav li {
  display: inline-block;
}

#nav a {
  color: white;
  padding: 8px 15px;
  text-decoration: none;
  font-weight: 500;
  border-radius: 5px;
  transition: 0.3s;
}

#nav a:hover {
  background: white;
  color: #0d6efd;
}

/* ===== CARD STYLE ===== */
#rgt {
  padding: 15px;
}

.card-box {
  background: rgba(255,255,255,0.9);
  border-radius: 10px;
  padding: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* ===== DROPDOWN ===== */
.dropdowns-cont {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

select {
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

/* ===== TABLE ===== */
#table-container {
  width: 100%;
  overflow-x: auto;
}

#table-container table {
  width: 100%;
  min-width: 1200px;
  border-collapse: collapse;
}

#table-container th,
#table-container td {
  padding: 10px;
  text-align: center;
  white-space: nowrap;
}

#table-container th {
  background: #0d6efd;
  color: white;
  position: sticky;
  top: 0;
}

#table-container tr:nth-child(even) {
  background: #f2f2f2;
}

#table-container tr:hover {
  background: #dbe9ff;
  transition: 0.2s;
}

/* ===== RED TEXT FOR LAST TWO COLUMNS ===== */
#table-container td.red-text {
  color: red;
}

/* ===== LOADER ===== */
#loader {
  text-align: center;
  padding: 50px 0;
}

.spinner {
  border: 8px solid #f3f3f3;
  border-top: 8px solid #3498db;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  animation: spin 2s linear infinite;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* ===== MOBILE ===== */
@media(max-width:768px){
  .dropdowns-cont {
    flex-direction: column;
  }
}

</style>
</head>

<body>

<div class="container-fluid">

<!-- HEADER -->
<div class="header-outer">

  <div class="logimg">
    <img style="width:100px;height:50px" src="https://i.postimg.cc/hjVWw4Bg/images-roll.jpg">
  </div>

  <div class="commpanytitle">
    <h1>DAMATI Group</h1>
    <h4 id="userEmail"></h4>
  </div>

</div>

<!-- NAV (LEFT ALIGNED) -->
<div id="nav">
  <ul>
    <li><a href="Dashboard.html">FMS</a></li>
    <li><a href="Dashboard_MIS_PC.html">MIS</a></li>
  </ul>
</div>

<!-- CONTENT -->
<div id="rgt">

<div class="card-box">

<div id="loader">
  <!-- New Attractive CSS Spinner -->
  <div class="spinner"></div>
</div>

<div class="dropdowns-cont">
  <div id="dropdown-container"></div>
  <div id="dropdown-container-column-4"></div>
</div>

<div id="table-container"></div>

</div>

</div>

</div>

<script>

// USER EMAIL
const email = localStorage.getItem("userEmail");
document.getElementById("userEmail").textContent = "Doer Dashboard - " + email;

// FILTER
function filterTable(val) {
  document.querySelectorAll("#table-container table tr").forEach((row,i)=>{
    if(i===0)return;
    row.style.display = (val==="ALL" || row.cells[0].textContent===val) ? "" : "none";
  });
}

function filterTable1(val) {
  document.querySelectorAll("#table-container table tr").forEach((row,i)=>{
    if(i===0)return;
    row.style.display = (val==="ALL" || row.cells[1].textContent===val) ? "" : "none";
  });
}

// FETCH
fetch("https://sheets.googleapis.com/v4/spreadsheets/1ZRslDXVowBjcmrXnMwSu7cD7uXof9LpqM4YQ1Am_1V8/values/Master!B3:K?key=AIzaSyCLRtWIXscdR1T7xCKP3ICQNW3Ncreu4ig")
.then(res=>res.json())
.then(data=>{

const values=data.values;
const filtered=values.filter(r=>r[3]===email);

// DROPDOWN 1
const d1=[...new Set(filtered.map(r=>r[0]))];
const dd1=document.createElement("select");
dd1.innerHTML="<option>ALL</option>"+d1.map(v=>`<option>${v}</option>`).join("");
dd1.onchange=()=>filterTable(dd1.value);
document.getElementById("dropdown-container").appendChild(dd1);

// DROPDOWN 2
const d2=[...new Set(filtered.map(r=>r[1]))];
const dd2=document.createElement("select");
dd2.innerHTML="<option>ALL</option>"+d2.map(v=>`<option>${v}</option>`).join("");
dd2.onchange=()=>filterTable1(dd2.value);
document.getElementById("dropdown-container-column-4").appendChild(dd2);

// TABLE
const table=document.createElement("table");
table.classList.add("table","table-bordered");

const headers=['FMS Name','Step','Task','Doer','Avg Delay','Total','Delayed','Not Done','% ND','% Delay'];
const tr=document.createElement("tr");

headers.forEach(h=>{
  const th=document.createElement("th");
  th.textContent=h;
  tr.appendChild(th);
});

table.appendChild(tr);

filtered.forEach(r=>{
  const row=document.createElement("tr");
  r.forEach((c, index) => {
    const td=document.createElement("td");
    td.textContent=c;

    // Apply red text to last two columns
    if(index === 8 || index === 9) {
      td.classList.add("red-text");
    }

    row.appendChild(td);
  });
  table.appendChild(row);
});

// WRAPPER
const wrap=document.createElement("div");
wrap.style.overflowX="auto";
wrap.appendChild(table);

document.getElementById("table-container").appendChild(wrap);
document.getElementById("loader").style.display="none";

})
.catch(err=>console.error(err));

</script>

</body>
</html>
